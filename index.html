<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ STREET FURY</title>

<style>
body{
  background:black;
  color:red;
  text-align:center;
  font-family:Arial;
}

#menu{
  margin-top:40px;
}

#arena{
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:60px;
  margin:20px;
}

.bar{
  height:20px;
  background:green;
  margin:5px auto;
  width:200px;
}

button{
  padding:10px 15px;
  margin:5px;
  font-size:14px;
}
</style>
</head>

<body>

<h1>BHENZ STREET FURY</h1>

<div id="menu">
  <input type="text" id="heroInput" placeholder="Enter Hero Name">
  <br><br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="game" style="display:none;">

<h2 id="heroTitle"></h2>
<p>Level: <span id="level">1</span> | XP: <span id="xp">0</span>/100 | Gold: <span id="gold">0</span></p>

<div id="arena">
  <div>
    <div id="heroEmoji">🥊</div>
    <p>Player HP</p>
    <div id="playerBar" class="bar"></div>
  </div>

  <div>
    <h3 id="bossName"></h3>
    <div id="bossEmoji">👊</div>
    <p>Boss HP</p>
    <div id="enemyBar" class="bar"></div>
  </div>
</div>

<button onclick="attack()">Attack</button>
<button onclick="special()">Special</button>
<button onclick="heal()">Heal (20 Gold)</button>
<br>
<button onclick="upgradeAttack()">Upgrade Attack (50 Gold)</button>
<button onclick="nextLevel()">Next Level</button>

</div>

<script>

let heroName="";
let level=1;
let xp=0;
let xpNeed=100;
let gold=0;
let attackPower=15;

let playerMaxHP=100;
let playerHP=100;

let enemyHP=100;
let enemyMaxHP=100;

let bosses=[
  {name:"Mark", emoji:"👊"},
  {name:"Gelo", emoji:"⚡"},
  {name:"Midori", emoji:"🥷"},
  {name:"Jeth", emoji:"🔥"},
  {name:"Fred", emoji:"🐺"},
  {name:"MASTER BHENZ", emoji:"🌍"}
];

function startGame(){
  heroName=document.getElementById("heroInput").value;
  if(heroName=="") heroName="Hero";

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("heroTitle").innerText=heroName;

  loadBoss();
}

function loadBoss(){
  let boss=bosses[level-1];
  document.getElementById("bossName").innerText="Boss: "+boss.name;
  document.getElementById("bossEmoji").innerText=boss.emoji;

  enemyMaxHP=100+(level*50);
  enemyHP=enemyMaxHP;

  updateUI();
}

function updateUI(){
  document.getElementById("playerBar").style.width=(playerHP/playerMaxHP*200)+"px";
  document.getElementById("enemyBar").style.width=(enemyHP/enemyMaxHP*200)+"px";

  document.getElementById("level").innerText=level;
  document.getElementById("xp").innerText=xp;
  document.getElementById("gold").innerText=gold;
}

function attack(){
  let damage=Math.floor(Math.random()*attackPower)+5;
  enemyHP-=damage;

  if(enemyHP<=0){
    enemyHP=0;
    winBattle();
  }else{
    enemyAttack();
  }

  updateUI();
}

function special(){
  let damage=attackPower*2;

  if(level==6){
    alert("MASTER BHENZ EARTH SMASH!");
  }

  enemyHP-=damage;

  if(enemyHP<=0){
    enemyHP=0;
    winBattle();
  }else{
    enemyAttack();
  }

  updateUI();
}

function enemyAttack(){
  let damage=Math.floor(Math.random()*20)+5;
  playerHP-=damage;

  if(playerHP<=0){
    alert("You Lost!");
    location.reload();
  }
}

function winBattle(){
  alert("Boss Defeated!");

  xp+=50*level;
  gold+=30*level;

  if(xp>=xpNeed){
    levelUp();
  }
}

function levelUp(){
  xp=0;
  level++;
  playerMaxHP+=20;
  playerHP=playerMaxHP;
  attackPower+=5;

  alert("LEVEL UP!");

  if(level>6){
    alert("YOU BEAT MASTER BHENZ! GAME COMPLETE!");
    location.reload();
  }else{
    loadBoss();
  }
}

function nextLevel(){
  if(enemyHP==0){
    loadBoss();
  }else{
    alert("Defeat boss first!");
  }
}

function upgradeAttack(){
  if(gold>=50){
    gold-=50;
    attackPower+=5;
    alert("Attack Upgraded!");
  }else{
    alert("Not enough gold!");
  }
  updateUI();
}

function heal(){
  if(gold>=20){
    gold-=20;
    playerHP+=30;
    if(playerHP>playerMaxHP) playerHP=playerMaxHP;
  }else{
    alert("Not enough gold!");
  }
  updateUI();
}

</script>

</body>
</html>
