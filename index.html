<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ SPACE IMPACT</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.player{
position:absolute;
width:40px;
height:40px;
background:cyan;
border-radius:5px;
left:50px;
}

.enemy{
position:absolute;
width:40px;
height:40px;
background:red;
border-radius:5px;
}

.bullet{
position:absolute;
width:10px;
height:4px;
background:yellow;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
}

.ui{
position:absolute;
top:10px;
left:10px;
font-size:14px;
}

.controls{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

button{
padding:10px 15px;
margin:5px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="game">
<div class="ui">
Score: <span id="score">0</span> |
HP: <span id="hp">100</span>
</div>

<div id="player" class="player"></div>

<div class="controls">
<button onclick="moveUp()">UP</button>
<button onclick="moveDown()">DOWN</button>
<button onclick="shoot()">SHOOT</button>
</div>
</div>

<script>

let game=document.getElementById("game");
let player=document.getElementById("player");

let playerY=window.innerHeight/2;
let score=0;
let hp=100;

let bullets=[];
let enemies=[];

player.style.top=playerY+"px";

function moveUp(){
playerY-=30;
if(playerY<0) playerY=0;
player.style.top=playerY+"px";
}

function moveDown(){
playerY+=30;
if(playerY>window.innerHeight-40) playerY=window.innerHeight-40;
player.style.top=playerY+"px";
}

function shoot(){
let bullet=document.createElement("div");
bullet.className="bullet";
bullet.style.left="90px";
bullet.style.top=(playerY+18)+"px";
game.appendChild(bullet);
bullets.push(bullet);
}

function spawnEnemy(){
let enemy=document.createElement("div");
enemy.className="enemy";
enemy.style.left=window.innerWidth+"px";
enemy.style.top=Math.random()*(window.innerHeight-40)+"px";
game.appendChild(enemy);
enemies.push(enemy);
}

function spawnStars(){
for(let i=0;i<30;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight+"px";
game.appendChild(star);
}
}

spawnStars();

function update(){

// bullets
for(let i=0;i<bullets.length;i++){
let b=bullets[i];
b.style.left=(b.offsetLeft+10)+"px";

if(b.offsetLeft>window.innerWidth){
b.remove();
bullets.splice(i,1);
i--;
}
}

// enemies
for(let i=0;i<enemies.length;i++){
let e=enemies[i];
e.style.left=(e.offsetLeft-4)+"px";

if(e.offsetLeft<0){
hp-=10;
document.getElementById("hp").innerText=hp;
e.remove();
enemies.splice(i,1);
i--;
if(hp<=0){
alert("GAME OVER");
location.reload();
}
}
}

// collision
for(let i=0;i<bullets.length;i++){
for(let j=0;j<enemies.length;j++){
if(
bullets[i].offsetLeft < enemies[j].offsetLeft + 40 &&
bullets[i].offsetLeft + 10 > enemies[j].offsetLeft &&
bullets[i].offsetTop < enemies[j].offsetTop + 40 &&
bullets[i].offsetTop + 4 > enemies[j].offsetTop
){
bullets[i].remove();
enemies[j].remove();
bullets.splice(i,1);
enemies.splice(j,1);
score+=10;
document.getElementById("score").innerText=score;
break;
}
}
}

requestAnimationFrame(update);
}

setInterval(spawnEnemy,1500);

update();

</script>

</body>
</html>
