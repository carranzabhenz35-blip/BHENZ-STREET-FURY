<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ BOMBER MAN</title>
<style>
body{margin:0;background:#111;overflow:hidden;font-family:Arial;color:white;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let tile=40;
let cols=Math.floor(canvas.width/tile);
let rows=Math.floor(canvas.height/tile);

let map=[];
for(let y=0;y<rows;y++){
map[y]=[];
for(let x=0;x<cols;x++){
if(x===0||y===0||x===cols-1||y===rows-1){
map[y][x]=1; // wall
}else if(Math.random()<0.2){
map[y][x]=2; // breakable
}else{
map[y][x]=0; // empty
}
}
}

let player={x:1,y:1};
let enemy={x:cols-2,y:rows-2};
let bombs=[];
let explosions=[];
let gameOver=false;

// touch move
canvas.addEventListener("touchstart",e=>{
if(gameOver) return;
let touch=e.touches[0];
let gridX=Math.floor(touch.clientX/tile);
let gridY=Math.floor(touch.clientY/tile);

if(Math.abs(gridX-player.x)+Math.abs(gridY-player.y)===1){
if(map[gridY][gridX]===0){
player.x=gridX;
player.y=gridY;
}
}else{
placeBomb();
}
});

function placeBomb(){
bombs.push({x:player.x,y:player.y,timer:60});
}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// draw map
for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){
if(map[y][x]===1){
ctx.fillStyle="gray";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
if(map[y][x]===2){
ctx.fillStyle="brown";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
}
}

// bombs
bombs.forEach((b,i)=>{
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(b.x*tile+20,b.y*tile+20,15,0,Math.PI*2);
ctx.fill();

b.timer--;
if(b.timer<=0){
explode(b.x,b.y);
bombs.splice(i,1);
}
});

// explosions
explosions.forEach((ex,i)=>{
ctx.fillStyle="orange";
ctx.fillRect(ex.x*tile,ex.y*tile,tile,tile);
ex.timer--;
if(ex.timer<=0) explosions.splice(i,1);
});

// player
ctx.fillStyle="cyan";
ctx.fillRect(player.x*tile,player.y*tile,tile,tile);

// enemy move random
if(Math.random()<0.02){
let dir=[[1,0],[-1,0],[0,1],[0,-1]][Math.floor(Math.random()*4)];
let nx=enemy.x+dir[0];
let ny=enemy.y+dir[1];
if(map[ny]&&map[ny][nx]===0){
enemy.x=nx;
enemy.y=ny;
}
}

ctx.fillStyle="red";
ctx.fillRect(enemy.x*tile,enemy.y*tile,tile,tile);

// collision
explosions.forEach(ex=>{
if(ex.x===player.x && ex.y===player.y){
gameOver=true;
alert("GAME OVER");
location.reload();
}
if(ex.x===enemy.x && ex.y===enemy.y){
alert("YOU WIN!");
location.reload();
}
});

requestAnimationFrame(update);
}

function explode(x,y){
let dirs=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];
dirs.forEach(d=>{
let nx=x+d[0];
let ny=y+d[1];
if(map[ny]&&map[ny][nx]!==1){
if(map[ny][nx]===2) map[ny][nx]=0;
explosions.push({x:nx,y:ny,timer:30});
}
});
}

update();
</script>

</body>
</html>
