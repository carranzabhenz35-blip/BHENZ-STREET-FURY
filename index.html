<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ SPACE IMPACT</title>
<style>
body{
margin:0;
background:black;
overflow:hidden;
}
canvas{
display:block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player={
x:50,
y:canvas.height/2,
w:40,
h:40,
hp:100
};

let bullets=[];
let enemies=[];
let score=0;

function spawnEnemy(){
enemies.push({
x:canvas.width,
y:Math.random()*(canvas.height-40),
w:40,
h:40
});
}

function shoot(){
bullets.push({
x:player.x+40,
y:player.y+18,
w:10,
h:4
});
}

document.addEventListener("touchstart",shoot);

function update(){

// clear screen
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

// player
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.w,player.h);

// bullets
for(let i=0;i<bullets.length;i++){
bullets[i].x+=8;
ctx.fillStyle="yellow";
ctx.fillRect(bullets[i].x,bullets[i].y,bullets[i].w,bullets[i].h);

if(bullets[i].x>canvas.width){
bullets.splice(i,1);
i--;
}
}

// enemies
for(let i=0;i<enemies.length;i++){
enemies[i].x-=4;
ctx.fillStyle="red";
ctx.fillRect(enemies[i].x,enemies[i].y,enemies[i].w,enemies[i].h);

if(enemies[i].x<0){
player.hp-=10;
enemies.splice(i,1);
i--;
if(player.hp<=0){
alert("GAME OVER");
location.reload();
}
}
}

// collision
for(let i=0;i<bullets.length;i++){
for(let j=0;j<enemies.length;j++){
if(
bullets[i].x < enemies[j].x + 40 &&
bullets[i].x + 10 > enemies[j].x &&
bullets[i].y < enemies[j].y + 40 &&
bullets[i].y + 4 > enemies[j].y
){
bullets.splice(i,1);
enemies.splice(j,1);
score+=10;
break;
}
}
}

// UI
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("HP: "+player.hp,20,30);
ctx.fillText("Score: "+score,20,50);

requestAnimationFrame(update);
}

setInterval(spawnEnemy,1500);

update();
</script>

</body>
</html>
