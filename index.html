<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ SPACE IMPACT WAR</title>
<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;color:white;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player={x:80,y:canvas.height/2,hp:100};
let bullets=[];
let enemies=[];
let bossBullets=[];
let explosions=[];
let stars=[];
let score=0;
let stage=1;
let boss=null;
let moveDir=0;
let stageTarget=120;

// stars
for(let i=0;i<80;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

// auto fire
setInterval(()=>{
bullets.push({x:player.x+30,y:player.y});
},300);

// enemy spawn
function spawnEnemy(){
if(!boss){
enemies.push({
x:canvas.width,
y:Math.random()*(canvas.height-40),
speed:3+stage
});
}
}
setInterval(spawnEnemy,1200);

// touch control
canvas.addEventListener("touchstart",e=>{
let y=e.touches[0].clientY;
moveDir = y < canvas.height/2 ? -1 : 1;
});
canvas.addEventListener("touchend",()=>moveDir=0);

function drawShip(x,y){
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x-25,y-15);
ctx.lineTo(x-25,y+15);
ctx.closePath();
ctx.fill();

ctx.fillStyle="orange";
ctx.beginPath();
ctx.moveTo(x-25,y-8);
ctx.lineTo(x-40,y);
ctx.lineTo(x-25,y+8);
ctx.closePath();
ctx.fill();
}

function spawnBoss(){
boss={
x:canvas.width-160,
y:canvas.height/2,
hp:300 + stage*80,
shootTimer:0
};
}

function update(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

// stars
ctx.fillStyle="white";
stars.forEach(s=>{
s.x-=1;
if(s.x<0){s.x=canvas.width;s.y=Math.random()*canvas.height;}
ctx.fillRect(s.x,s.y,s.size,s.size);
});

// move player
player.y+=moveDir*5;
if(player.y<20) player.y=20;
if(player.y>canvas.height-20) player.y=canvas.height-20;

drawShip(player.x,player.y);

// bullets
bullets.forEach((b,i)=>{
b.x+=10;
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y-2,15,4);
if(b.x>canvas.width) bullets.splice(i,1);
});

// enemies
enemies.forEach((e,i)=>{
e.x-=e.speed;
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,40,40);

if(e.x<0){
player.hp-=10;
enemies.splice(i,1);
}
});

// enemy collision
bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{
if(b.x<e.x+40 && b.x+15>e.x && b.y>e.y && b.y<e.y+40){
explosions.push({x:e.x,y:e.y,life:15});
enemies.splice(ei,1);
bullets.splice(bi,1);
score+=10;
}
});
});

// spawn boss
if(score>=stageTarget && !boss){
spawnBoss();
}

// boss logic
if(boss){
ctx.fillStyle="purple";
ctx.fillRect(boss.x,boss.y-70,140,140);

ctx.fillStyle="white";
ctx.fillText("BOSS HP: "+boss.hp,boss.x,boss.y-80);

// boss shoot
boss.shootTimer++;
if(boss.shootTimer>60){
bossBullets.push({x:boss.x,y:boss.y});
boss.shootTimer=0;
}

// boss bullets
bossBullets.forEach((bb,i)=>{
bb.x-=6;
ctx.fillStyle="orange";
ctx.fillRect(bb.x,bb.y-3,12,6);

if(bb.x<0) bossBullets.splice(i,1);

// hit player
if(bb.x<player.x+10 && bb.x>player.x-20 &&
bb.y>player.y-15 && bb.y<player.y+15){
player.hp-=15;
bossBullets.splice(i,1);
}
});

// hit boss
bullets.forEach((b,bi)=>{
if(b.x<boss.x+140 && b.x+15>boss.x &&
b.y>boss.y-70 && b.y<boss.y+70){
boss.hp-=10;
bullets.splice(bi,1);
}
});

if(boss.hp<=0){
explosions.push({x:boss.x,y:boss.y,life:40});
boss=null;
stage++;
stageTarget+=200;
score=0;
alert("STAGE "+stage+" START!");
}
}

// explosions
explosions.forEach((ex,i)=>{
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(ex.x,ex.y,ex.life,0,Math.PI*2);
ctx.fill();
ex.life-=2;
if(ex.life<=0) explosions.splice(i,1);
});

// UI
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("HP: "+player.hp,20,30);
ctx.fillText("Stage: "+stage,20,50);
ctx.fillText("Score: "+score+"/"+stageTarget,20,70);

if(player.hp<=0){
alert("GAME OVER");
location.reload();
}

requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
