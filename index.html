<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ STREET FURY</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
}

h1{
  color:red;
}

#arena{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin-top:30px;
}

.character{
  width:120px;
  transition:0.2s;
}

.attack-move{
  transform:translateX(20px);
}

.enemy-move{
  transform:translateX(-20px);
}

.hp-bar{
  width:150px;
  height:15px;
  background:#333;
  border:2px solid white;
  margin:5px auto;
}

.hp-fill{
  height:100%;
  background:lime;
  width:100%;
}

button{
  padding:10px 15px;
  margin:5px;
  font-weight:bold;
  border:none;
  border-radius:5px;
  color:white;
}

.attack{background:red;}
.special{background:blue;}
.heal{background:green;}
.upgrade{background:gray;}
</style>
</head>

<body>

<h1>BHENZ STREET FURY</h1>

<div id="menu">
<input type="text" id="heroInput" placeholder="Enter Hero Name">
<br><br>
<button class="attack" onclick="startGame()">START</button>
</div>

<div id="game" style="display:none;">

<h3 id="heroTitle"></h3>
<p>Level: <span id="level">1</span> | Gold: <span id="gold">0</span></p>

<div id="arena">

<div>
<img id="playerImg" class="character" 
src="https://i.imgur.com/8QfR5wG.png">
<div class="hp-bar">
<div id="playerHP" class="hp-fill"></div>
</div>
</div>

<div style="font-size:40px;">VS</div>

<div>
<img id="enemyImg" class="character" 
src="https://i.imgur.com/6XgP6Dk.png">
<div class="hp-bar">
<div id="enemyHP" class="hp-fill"></div>
</div>
<h3 id="bossName"></h3>
</div>

</div>

<br>

<button class="attack" onclick="attack()">ATTACK</button>
<button class="special" onclick="special()">SPECIAL</button>
<button class="heal" onclick="heal()">HEAL</button>
<button class="upgrade" onclick="upgrade()">UPGRADE</button>

</div>

<script>

let level=1;
let gold=0;
let attackPower=15;

let playerMax=100;
let playerHP=100;

let enemyMax=100;
let enemyHP=100;

let bosses=["Mark","Gelo","Midori","Jeth","Fred","MASTER BHENZ"];

function startGame(){
  let name=document.getElementById("heroInput").value;
  if(name=="") name="Hero";

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("heroTitle").innerText="Hero: "+name;

  loadBoss();
}

function loadBoss(){
  document.getElementById("bossName").innerText="Boss: "+bosses[level-1];
  enemyMax=100+(level*40);
  enemyHP=enemyMax;
  updateUI();
}

function updateUI(){
  document.getElementById("playerHP").style.width=(playerHP/playerMax*100)+"%";
  document.getElementById("enemyHP").style.width=(enemyHP/enemyMax*100)+"%";
  document.getElementById("level").innerText=level;
  document.getElementById("gold").innerText=gold;
}

function attack(){

  let player=document.getElementById("playerImg");
  player.classList.add("attack-move");
  setTimeout(()=>player.classList.remove("attack-move"),200);

  let dmg=Math.floor(Math.random()*attackPower)+5;
  enemyHP-=dmg;

  if(enemyHP<=0){
    enemyHP=0;
    win();
  }

  updateUI();
}

function special(){
  let dmg=attackPower*2;
  enemyHP-=dmg;

  if(enemyHP<=0){
    enemyHP=0;
    win();
  }

  updateUI();
}

function enemyAttack(){

  let enemy=document.getElementById("enemyImg");
  enemy.classList.add("enemy-move");
  setTimeout(()=>enemy.classList.remove("enemy-move"),200);

  let dmg=Math.floor(Math.random()*20)+5;
  playerHP-=dmg;

  if(playerHP<=0){
    alert("YOU LOST!");
    location.reload();
  }

  updateUI();
}

function win(){
  alert("Boss Defeated!");
  gold+=30*level;
  level++;

  if(level>6){
    alert("YOU BEAT MASTER BHENZ!");
    location.reload();
  }else{
    loadBoss();
  }
}

function heal(){
  if(gold>=20){
    gold-=20;
    playerHP+=30;
    if(playerHP>playerMax) playerHP=playerMax;
  }
  updateUI();
}

function upgrade(){
  if(gold>=50){
    gold-=50;
    attackPower+=5;
  }
  updateUI();
}

setInterval(()=>{
  if(enemyHP>0){
    enemyAttack();
  }
},3000);

</script>

</body>
</html>
