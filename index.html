<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ STREET FURY</title>

<style>
body{
  margin:0;
  background:#222;
  overflow:hidden;
  font-family:Arial;
}

#game{
  width:100vw;
  height:100vh;
  background:linear-gradient(#444,#111);
  position:relative;
}

.fighter{
  width:60px;
  height:100px;
  position:absolute;
  bottom:50px;
  background:red;
}

#enemy{
  background:blue;
}

.hp-container{
  position:absolute;
  top:20px;
  width:40%;
  height:20px;
  background:#333;
  border:2px solid white;
}

#playerHPContainer{ left:20px; }
#enemyHPContainer{ right:20px; }

.hp{
  height:100%;
  background:lime;
  width:100%;
}

.controls{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
}

button{
  padding:10px 15px;
  margin:5px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="game">

<div id="playerHPContainer" class="hp-container">
<div id="playerHP" class="hp"></div>
</div>

<div id="enemyHPContainer" class="hp-container">
<div id="enemyHP" class="hp"></div>
</div>

<div id="player" class="fighter" style="left:100px;"></div>
<div id="enemy" class="fighter" style="right:100px;"></div>

<div class="controls">
<button onclick="moveLeft()">Left</button>
<button onclick="moveRight()">Right</button>
<button onclick="jump()">Jump</button>
<button onclick="punch()">Punch</button>
</div>

</div>

<script>

let player=document.getElementById("player");
let enemy=document.getElementById("enemy");

let playerX=100;
let enemyX=window.innerWidth-160;

let playerHP=100;
let enemyHP=100;

let isJumping=false;
let velocityY=0;
let gravity=0.8;

function update(){
  player.style.left=playerX+"px";
  enemy.style.left=enemyX+"px";

  document.getElementById("playerHP").style.width=playerHP+"%";
  document.getElementById("enemyHP").style.width=enemyHP+"%";

  // gravity
  if(isJumping){
    velocityY-=gravity;
    let bottom=parseInt(player.style.bottom||50);
    bottom+=velocityY;
    if(bottom<=50){
      bottom=50;
      isJumping=false;
      velocityY=0;
    }
    player.style.bottom=bottom+"px";
  }
}

function moveLeft(){
  playerX-=20;
  if(playerX<0) playerX=0;
  update();
}

function moveRight(){
  playerX+=20;
  if(playerX>window.innerWidth-100) playerX=window.innerWidth-100;
  update();
}

function jump(){
  if(!isJumping){
    isJumping=true;
    velocityY=15;
  }
}

function punch(){
  let distance=Math.abs(playerX-enemyX);
  if(distance<100){
    enemyHP-=10;
    if(enemyHP<0) enemyHP=0;
  }
  update();
}

// Enemy AI
setInterval(()=>{
  if(enemyHP<=0 || playerHP<=0) return;

  if(enemyX>playerX){
    enemyX-=10;
  }else{
    enemyX+=10;
  }

  let distance=Math.abs(playerX-enemyX);
  if(distance<100){
    playerHP-=5;
    if(playerHP<0) playerHP=0;
  }

  update();

  if(playerHP<=0){
    alert("YOU LOST!");
    location.reload();
  }

  if(enemyHP<=0){
    alert("YOU WIN!");
    location.reload();
  }

},1000);

update();

</script>

</body>
</html>
