<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ STREET FURY</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1542751371-adc38448a05e") no-repeat center center fixed;
  background-size:cover;
  color:white;
  text-align:center;
}

.overlay{
  background:rgba(0,0,0,0.8);
  min-height:100vh;
  padding:20px;
}

h1{
  color:#ff2a2a;
  margin-top:10px;
}

#arena{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin-top:30px;
}

.character{
  font-size:80px;
}

.vs{
  font-size:60px;
  color:orange;
  font-weight:bold;
}

.hp-bar{
  width:200px;
  height:20px;
  background:#333;
  border:2px solid white;
  margin:5px auto;
}

.hp-fill{
  height:100%;
  background:lime;
  width:100%;
}

button{
  padding:12px 18px;
  margin:6px;
  font-size:14px;
  font-weight:bold;
  border:none;
  border-radius:6px;
  color:white;
}

.attack{background:#c40000;}
.special{background:#0055ff;}
.heal{background:#009933;}
.upgrade{background:#444;}
</style>
</head>

<body>

<div class="overlay">

<h1>BHENZ STREET FURY</h1>

<div id="menu">
  <input type="text" id="heroInput" placeholder="Enter Hero Name">
  <br><br>
  <button class="attack" onclick="startGame()">Start Game</button>
</div>

<div id="game" style="display:none;">

<h3 id="heroTitle"></h3>
<p>Level: <span id="level">1</span> | XP: <span id="xp">0</span>/100 | Gold: <span id="gold">0</span></p>

<div id="arena">
  <div>
    <div class="character">🥊</div>
    <div class="hp-bar">
      <div id="playerHP" class="hp-fill"></div>
    </div>
  </div>

  <div class="vs">VS</div>

  <div>
    <div id="bossEmoji" class="character"></div>
    <div class="hp-bar">
      <div id="enemyHP" class="hp-fill"></div>
    </div>
    <h3 id="bossName"></h3>
  </div>
</div>

<br>

<button class="attack" onclick="attack()">ATTACK</button>
<button class="special" onclick="special()">SPECIAL</button>
<button class="heal" onclick="heal()">HEAL (20G)</button>
<br>
<button class="upgrade" onclick="upgradeAttack()">UPGRADE (50G)</button>

</div>

</div>

<script>

let heroName="";
let level=1;
let xp=0;
let xpNeed=100;
let gold=0;
let attackPower=15;

let playerMaxHP=100;
let playerHP=100;

let enemyHP=100;
let enemyMaxHP=100;

let bosses=[
  {name:"Mark", emoji:"👊"},
  {name:"Gelo", emoji:"⚡"},
  {name:"Midori", emoji:"🥷"},
  {name:"Jeth", emoji:"🔥"},
  {name:"Fred", emoji:"🐺"},
  {name:"MASTER BHENZ", emoji:"🌍"}
];

function startGame(){
  heroName=document.getElementById("heroInput").value;
  if(heroName=="") heroName="Hero";

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("heroTitle").innerText="Hero: "+heroName;

  loadBoss();
}

function loadBoss(){
  let boss=bosses[level-1];
  document.getElementById("bossName").innerText="Boss: "+boss.name;
  document.getElementById("bossEmoji").innerText=boss.emoji;

  enemyMaxHP=120+(level*50);
  enemyHP=enemyMaxHP;

  updateUI();
}

function updateUI(){
  document.getElementById("playerHP").style.width=(playerHP/playerMaxHP*100)+"%";
  document.getElementById("enemyHP").style.width=(enemyHP/enemyMaxHP*100)+"%";

  document.getElementById("level").innerText=level;
  document.getElementById("xp").innerText=xp;
  document.getElementById("gold").innerText=gold;
}

function attack(){
  if(Math.random()<0.15){ alert("Boss Dodged!"); return; }

  let damage=Math.floor(Math.random()*attackPower)+5;

  if(Math.random()<0.2){
    damage*=2;
    alert("CRITICAL HIT!");
  }

  enemyHP-=damage;
  if(enemyHP<=0){ enemyHP=0; winBattle(); }
  updateUI();
}

function special(){
  let damage=attackPower*2;
  enemyHP-=damage;

  if(level==6){ alert("MASTER BHENZ EARTH SMASH!"); }

  if(enemyHP<=0){ enemyHP=0; winBattle(); }
  updateUI();
}

function enemyAttack(){
  if(enemyHP<=0) return;

  if(Math.random()<0.15){ alert("You Dodged!"); return; }

  let damage=Math.floor(Math.random()*(10+level*5))+5;

  if(Math.random()<0.2){
    damage*=2;
    alert("Boss CRITICAL!");
  }

  playerHP-=damage;
  if(playerHP<0) playerHP=0;
  updateUI();

  if(playerHP<=0){
    alert("YOU LOST!");
    location.reload();
  }
}

function winBattle(){
  alert("Boss Defeated!");
  xp+=50*level;
  gold+=30*level;

  if(xp>=xpNeed){ levelUp(); }
}

function levelUp(){
  xp=0;
  level++;
  playerMaxHP+=20;
  playerHP=playerMaxHP;
  attackPower+=5;

  alert("LEVEL UP!");

  if(level>6){
    alert("YOU BEAT MASTER BHENZ!");
    location.reload();
  }else{
    loadBoss();
  }
}

function upgradeAttack(){
  if(gold>=50){
    gold-=50;
    attackPower+=5;
    alert("Attack Upgraded!");
  }else{
    alert("Not enough gold!");
  }
  updateUI();
}

function heal(){
  if(gold>=20){
    gold-=20;
    playerHP+=30;
    if(playerHP>playerMaxHP) playerHP=playerMaxHP;
  }else{
    alert("Not enough gold!");
  }
  updateUI();
}

setInterval(function(){
  if(document.getElementById("game").style.display=="block" && enemyHP>0){
    enemyAttack();
  }
},3000);

</script>

</body>
</html>
