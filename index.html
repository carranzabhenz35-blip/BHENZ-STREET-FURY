<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BHENZ SPACE IMPACT PRO</title>
<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;color:white;}
canvas{display:block;}
#controls{
position:fixed;
bottom:25px;
width:100%;
text-align:center;
}
.arrowBtn{
width:70px;
height:70px;
font-size:35px;
border-radius:50%;
border:none;
margin:10px;
background:#111;
color:white;
box-shadow:0 0 15px cyan;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="controls">
<button class="arrowBtn"
ontouchstart="moveUp=true"
ontouchend="moveUp=false">⬆️</button>

<button class="arrowBtn"
ontouchstart="moveDown=true"
ontouchend="moveDown=false">⬇️</button>
</div>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let player={x:80,y:canvas.height/2,hp:100};
let bullets=[];
let enemies=[];
let explosions=[];
let stars=[];
let score=0;
let moveUp=false;
let moveDown=false;
let tripleShot=false;
let shield=false;
let boss=null;

// ⭐ STAR BACKGROUND
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

// AUTO FIRE
setInterval(()=>{
if(tripleShot){
bullets.push({x:player.x+30,y:player.y});
bullets.push({x:player.x+30,y:player.y-10});
bullets.push({x:player.x+30,y:player.y+10});
}else{
bullets.push({x:player.x+30,y:player.y});
}
},300);

// ENEMY SPAWN
setInterval(()=>{
if(!boss){
enemies.push({
x:canvas.width,
y:Math.random()*(canvas.height-40),
size:40,
speed:4 + score/200
});
}
},1200);

// BOSS SPAWN
function spawnBoss(){
boss={
x:canvas.width,
y:canvas.height/2,
hp:200
};
}

function drawShip(x,y){
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x-25,y-15);
ctx.lineTo(x-25,y+15);
ctx.closePath();
ctx.fill();

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(x-10,y,5,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="orange";
ctx.beginPath();
ctx.moveTo(x-25,y-8);
ctx.lineTo(x-40,y);
ctx.lineTo(x-25,y+8);
ctx.closePath();
ctx.fill();
}

function update(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

// ⭐ Move stars
ctx.fillStyle="white";
stars.forEach(s=>{
s.x-=1;
if(s.x<0){s.x=canvas.width;s.y=Math.random()*canvas.height;}
ctx.fillRect(s.x,s.y,s.size,s.size);
});

// Move player
if(moveUp) player.y-=5;
if(moveDown) player.y+=5;
if(player.y<20) player.y=20;
if(player.y>canvas.height-20) player.y=canvas.height-20;

drawShip(player.x,player.y);

// Bullets
bullets.forEach((b,i)=>{
b.x+=10;
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y-2,15,4);
if(b.x>canvas.width) bullets.splice(i,1);
});

// Enemies
enemies.forEach((e,i)=>{
e.x-=e.speed;
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,40,40);
if(e.x<0){
if(!shield) player.hp-=10;
enemies.splice(i,1);
}
});

// Boss
if(score>=200 && !boss) spawnBoss();

if(boss){
boss.x-=2;
ctx.fillStyle="purple";
ctx.fillRect(boss.x,boss.y-50,100,100);

ctx.fillStyle="white";
ctx.fillText("BOSS HP: "+boss.hp,boss.x,boss.y-60);

if(boss.hp<=0){
score+=200;
boss=null;
}
}

// Collision
bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{
if(b.x<e.x+40 && b.x+15>e.x && b.y<e.y+40 && b.y>e.y){
explosions.push({x:e.x,y:e.y});
enemies.splice(ei,1);
bullets.splice(bi,1);
score+=10;
}
});
if(boss){
if(b.x<boss.x+100 && b.x+15>boss.x &&
b.y>boss.y-50 && b.y<boss.y+50){
boss.hp-=10;
bullets.splice(bi,1);
}
}
});

// Explosions
explosions.forEach((ex,i)=>{
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(ex.x,ex.y,20,0,Math.PI*2);
ctx.fill();
explosions.splice(i,1);
});

// Power-ups random
if(Math.random()<0.002){
tripleShot=true;
setTimeout(()=>tripleShot=false,5000);
}
if(Math.random()<0.002){
shield=true;
setTimeout(()=>shield=false,5000);
}

// UI
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("HP: "+player.hp,20,30);
ctx.fillText("Score: "+score,20,50);

if(shield){
ctx.fillText("SHIELD ACTIVE",20,70);
}

if(player.hp<=0){
alert("GAME OVER");
location.reload();
}

requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
